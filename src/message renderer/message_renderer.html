<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Message Renderer Test</title>
    <link rel="stylesheet" href="message_renderer.css">
    <link rel="stylesheet" href="messagebox.css">
    <link rel="stylesheet" href="nameplate.css">
    <link rel="stylesheet" href="avatarbox.css">
  </head>

  <body>
    <main class="stage">
        <article class="message-renderer">
            <div class="bubble-avatar">
                <div class="avatarbox">
                    <img class="avatarbox-image" src="hiii.png" alt="Avatar">
                </div>
                <img class="status-image" src="heartyheart.png" alt="">
            </div>

            <div class="bubble-content">
                <div class="messagebox">
                    <span class="message"> 
                    Hewoo hawooo haiii hiii
                    </span>
                    <svg
                    class="cloud-corner"
                    viewBox="127.72 105.02 66.44 37.54"
                    aria-hidden="true"
                    >
                    <defs>
                        <path
                        id="cloud-shape"
                        d="
                            M128.436 122.64
                            c2.651-17.241 23.788-23.283 35.508-8.651
                            c11.439-3.6 16.911 7.307 16.39 9.058
                            c7.501 1.683 13.106 8.384 13.106 16.393
                            v2.4
                            H128.436
                            Z
                        "
                        />

                        <clipPath id="cloud-clip">
                        <use href="#cloud-shape" />
                        </clipPath>
                    </defs>

                    <path
                        class="cloud-highlight"
                        clip-path="url(#cloud-clip)"
                        d="M122 104 H200 V128.7 H122 Z"
                    />

                    <path
                        class="cloud-outline"
                        d="
                        M128.436 122.64
                        c2.651-17.241 23.788-23.283 35.508-8.651
                        c11.439-3.6 16.911 7.307 16.39 9.058
                        c7.501 1.683 13.106 8.384 13.106 16.393
                        v2.4
                        "
                    />
                    </svg>
                </div>

                <div class="nameplate">
                    <span class="nameplate-text">ricy_rice</span>
                    <img class="spark1" src="sparkyspark.png" alt="">
                    <img class="spark2" src="sparkyspark.png" alt="">
                </div>

                <img class="moon" src="moon.png" alt="">
                <img class="flower1" src="flawa.png" alt="">
                <img class="flower2" src="flawe.png" alt="">
            </div>

        </article>
    </main>
  </body>
</html>
